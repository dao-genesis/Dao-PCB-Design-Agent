<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<style>
  :root { color-scheme: light dark; }
  body { margin:0; font: 13px/1.5 -apple-system, "Segoe UI", sans-serif;
         display:flex; flex-direction:column; height:100vh;
         background: var(--vscode-sideBar-background, #1e1e1e);
         color: var(--vscode-foreground, #ddd); }
  #log { flex:1; overflow-y:auto; padding:10px; }
  .msg { margin:6px 0; padding:8px 10px; border-radius:8px; white-space:pre-wrap;
         word-break:break-all; max-width:92%; }
  .me  { background: var(--vscode-button-background,#0e639c); color:#fff;
         margin-left:auto; }
  .bot { background: var(--vscode-editorWidget-background,#2d2d2d); }
  .bot.err { border-left: 3px solid #d9534f; }
  .stage { opacity:.7; font-style:italic; }
  #chips { display:flex; flex-wrap:wrap; gap:6px; padding:6px 10px; }
  .chip { border:1px solid var(--vscode-button-background,#0e639c);
          border-radius:12px; padding:2px 10px; cursor:pointer; font-size:12px; }
  .chip:hover { background: var(--vscode-button-background,#0e639c); color:#fff; }
  #bar { display:flex; gap:6px; padding:8px 10px 10px; }
  #in { flex:1; padding:6px 8px; border-radius:6px;
        border:1px solid var(--vscode-input-border,#444);
        background: var(--vscode-input-background,#252525);
        color: var(--vscode-input-foreground,#eee); }
  #send { border:0; border-radius:6px; padding:6px 14px; cursor:pointer;
          background: var(--vscode-button-background,#0e639c); color:#fff; }
</style>
</head>
<body>
<div id="log"><div class="msg bot">☯ DAO KiCad Copilot — 说出意图即可: “跑全链路”、“ERC”、“布线”、“DRC”、“出制造文件”。可直接贴 .kicad_sch/.kicad_pcb 路径。</div></div>
<div id="chips">
  <span class="chip">全链路闭环</span><span class="chip">ERC</span>
  <span class="chip">建板</span><span class="chip">布线</span>
  <span class="chip">DRC</span><span class="chip">制造文件</span>
</div>
<div id="bar">
  <input id="in" placeholder="对板子说点什么… (Enter 发送)">
  <button id="send">发送</button>
</div>
<script>
  const SERVER = "__SERVER__", ROOT = "__ROOT__";
  const log = document.getElementById("log"), inp = document.getElementById("in");
  function add(cls, text) {
    const d = document.createElement("div");
    d.className = "msg " + cls; d.textContent = text;
    log.appendChild(d); log.scrollTop = log.scrollHeight; return d;
  }
  function brief(r) {
    if (!r || typeof r !== "object") return String(r);
    const keep = {};
    for (const k of ["ok","clean","pcb","out","violations","unconnected",
                     "nets","tracks","stage","error","reason"])
      if (r[k] !== undefined) keep[k] = r[k];
    if (r.steps && r.steps.drc)
      keep.drc = { violations: r.steps.drc.violations,
                   unconnected: r.steps.drc.unconnected };
    return JSON.stringify(keep, null, 1);
  }
  async function poll(job, node) {
    for (;;) {
      await new Promise(r => setTimeout(r, 4000));
      const s = await fetch(SERVER + "/api/job?id=" + job).then(r => r.json())
        .catch(() => null);
      if (!s) continue;
      if (s.done) {
        node.classList.remove("stage");
        node.classList.toggle("err", !(s.result && s.result.ok));
        node.textContent = brief(s.result); return;
      }
      node.textContent = "⏳ " + (s.stage || "运行中") + " …";
    }
  }
  async function send(text) {
    if (!text.trim()) return;
    add("me", text); inp.value = "";
    const wait = add("bot stage", "…");
    try {
      const r = await fetch(SERVER + "/api/agent", { method: "POST",
        body: JSON.stringify({ text, root: ROOT }) }).then(r => r.json());
      wait.textContent = r.reply || brief(r);
      wait.classList.remove("stage");
      wait.classList.toggle("err", r.ok === false);
      if (r.result) add("bot", brief(r.result));
      if (r.job) poll(r.job, add("bot stage", "⏳ 排队中 …"));
    } catch (e) {
      wait.textContent = "桥接不可达: " + e; wait.className = "msg bot err";
    }
  }
  document.getElementById("send").onclick = () => send(inp.value);
  inp.addEventListener("keydown", e => { if (e.key === "Enter") send(inp.value); });
  for (const c of document.querySelectorAll(".chip"))
    c.onclick = () => send(c.textContent);
</script>
</body>
</html>
