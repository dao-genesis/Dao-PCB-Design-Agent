name: Auto-merge clean PRs

# 道法自然 · 无为而无不为：无冲突的 PR 自动合并，有冲突的留待人工解决。
# 触发：PR 开启/更新/重开/转就绪 时自动判定；亦可手动 workflow_dispatch 扫描全部开放 PR。

on:
  pull_request_target:
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: auto-merge-${{ github.event.pull_request.number || 'sweep' }}
  cancel-in-progress: false

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event.pull_request.draft == false &&
       github.event.pull_request.head.repo.full_name == github.repository)
    steps:
      - name: Merge mergeable PR(s)
        uses: actions/github-script@v9
        with:
          # 优先用 DAO_MERGE_TOKEN(PAT): 用 GITHUB_TOKEN 做 update-branch 生成的合并提交,
          # 其 CI 会被 GitHub 判为 action_required 而永不运行 → DAO Auto-Merge 永不触发(死锁)。
          # 改用 PAT 推送 → synchronize 事件的 CI 正常运行 → 绿灯后自动合并, 全程零人工。
          github-token: ${{ secrets.DAO_MERGE_TOKEN || secrets.GITHUB_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            let numbers = [];
            if (context.eventName === 'workflow_dispatch') {
              const prs = await github.paginate(github.rest.pulls.list, {
                owner, repo, state: 'open', per_page: 100,
              });
              numbers = prs
                .filter(p => !p.draft && p.head.repo && p.head.repo.full_name === `${owner}/${repo}`)
                .map(p => p.number);
            } else {
              numbers = [context.payload.pull_request.number];
            }

            for (const number of numbers) {
              let pr = null;
              for (let i = 0; i < 10; i++) {
                pr = (await github.rest.pulls.get({ owner, repo, pull_number: number })).data;
                if (pr.mergeable !== null) break;
                await new Promise(r => setTimeout(r, 4000));
              }
              if (!pr || pr.state !== 'open') { core.info(`#${number}: not open, skip`); continue; }
              if (pr.draft) { core.info(`#${number}: draft, skip`); continue; }
              if (pr.mergeable === false) { core.info(`#${number}: has conflicts, leaving for manual resolution`); continue; }
              if (pr.mergeable !== true) { core.info(`#${number}: mergeability still unknown, skip this run`); continue; }
              if (pr.mergeable_state === 'behind') {
                // 分支落后于 base: 严格状态检查会以 405 拒绝合并。
                // 先 update-branch → synchronize → CI 重跑 → 绿灯后由 dao-auto-merge 完成合并。
                try {
                  await github.rest.pulls.updateBranch({ owner, repo, pull_number: number });
                  core.notice(`#${number}: behind base, branch updated — will auto-merge after CI reruns`);
                } catch (e) {
                  core.warning(`#${number}: update-branch failed (${e.status}) ${e.message}`);
                }
                continue;
              }
              try {
                await github.rest.pulls.merge({ owner, repo, pull_number: number, merge_method: 'merge' });
                core.notice(`#${number}: merged`);
              } catch (e) {
                core.warning(`#${number}: merge failed (${e.status}) ${e.message}`);
              }
            }