<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PCB Copilot — 道之对话</title>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: -apple-system, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
    background: #16161e; color: #e6e6e6;
    display: flex; flex-direction: column; font-size: 13px;
  }
  header {
    padding: 10px 14px; border-bottom: 1px solid #2a2a3a;
    display: flex; align-items: center; gap: 8px; flex: 0 0 auto;
  }
  header .title { font-size: 14px; color: #4fc3f7; font-weight: 700; }
  header .dot { width: 8px; height: 8px; border-radius: 50%; background: #555; }
  header .dot.ok { background: #66bb6a; }
  header .dot.bad { background: #ef5350; }
  header .sub { color: #777; font-size: 11px; margin-left: auto; }

  #history {
    flex: 1 1 auto; overflow-y: auto; padding: 14px;
    display: flex; flex-direction: column; gap: 12px;
  }
  .msg { display: flex; flex-direction: column; gap: 4px; max-width: 100%; }
  .msg .who { font-size: 11px; color: #888; }
  .bubble {
    padding: 9px 12px; border-radius: 10px; line-height: 1.5;
    white-space: pre-wrap; word-break: break-word;
  }
  .msg.user { align-items: flex-end; }
  .msg.user .bubble { background: #245; color: #dcefff; border-bottom-right-radius: 2px; }
  .msg.ai .bubble { background: #20202c; border: 1px solid #2f2f40; border-bottom-left-radius: 2px; }
  .msg.sys .bubble { background: transparent; color: #777; font-size: 11px; padding: 2px 0; }

  .verdict { margin-top: 8px; border-top: 1px dashed #333; padding-top: 8px; }
  .verdict .line { display: flex; gap: 8px; align-items: center; margin: 3px 0; }
  .verdict .k { color: #888; min-width: 64px; font-size: 11px; }
  .vbadge { padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 700; }
  .vbadge.on { background: #1b5e20; color: #c8e6c9; }
  .vbadge.off { background: #5d4037; color: #ffe0b2; }
  .fe { font-family: Consolas, monospace; }
  .fe.zero { color: #66bb6a; } .fe.nonzero { color: #ffb74d; }
  .next { color: #90caf9; font-size: 12px; }
  .arts { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 6px; }
  .art { background: #1a1a26; border: 1px solid #333; border-radius: 4px;
         padding: 2px 7px; font-size: 11px; color: #aaa; font-family: monospace; }

  .typing { color: #888; font-style: italic; }
  .dots::after { content: '…'; animation: blink 1.2s infinite; }
  @keyframes blink { 0%,100%{opacity:.3} 50%{opacity:1} }

  footer {
    flex: 0 0 auto; border-top: 1px solid #2a2a3a; padding: 10px;
    display: flex; gap: 8px; align-items: flex-end;
  }
  #input {
    flex: 1 1 auto; resize: none; min-height: 38px; max-height: 120px;
    background: #20202c; color: #e6e6e6; border: 1px solid #333;
    border-radius: 8px; padding: 9px 11px; font: inherit; line-height: 1.4;
  }
  #input:focus { outline: none; border-color: #4fc3f7; }
  #send {
    flex: 0 0 auto; padding: 0 16px; height: 38px; border: none;
    background: #4fc3f7; color: #0d1117; border-radius: 8px;
    font-weight: 700; cursor: pointer;
  }
  #send:disabled { opacity: .45; cursor: not-allowed; }
  .hint { padding: 0 14px 8px; color: #555; font-size: 11px; }
  .chip { display:inline-block; background:#20202c; border:1px solid #333;
          border-radius: 12px; padding: 3px 10px; margin: 3px 4px 0 0;
          cursor: pointer; color:#9ad; font-size: 11px; }
  .chip:hover { border-color:#4fc3f7; }
</style>
</head>
<body>
<header>
  <span class="dot" id="dot"></span>
  <span class="title">PCB Copilot</span>
  <span class="sub" id="sub">道之对话 · 反者道之动</span>
</header>

<div id="history">
  <div class="msg ai">
    <span class="who">PCB Copilot</span>
    <div class="bubble">你好。用一句话告诉我你想做的板子, 我会走完整条链路:
规格 → DNA → 布局布线 → DRC/Gerber/BOM/CPL → 预测编码裁决, 再把"是否交付 / 自由能 / 下一步"告诉你。
逐步迭代, 人机共驾。</div>
  </div>
</div>

<div class="hint">
  试试:
  <span class="chip" data-q="我想做一个ESP32 WiFi 控制板">ESP32 WiFi 板</span>
  <span class="chip" data-q="做一个STM32F103串口点阵屏的板子">STM32 点阵屏</span>
  <span class="chip" data-q="做一个AMS1117 3.3V 稳压电源模块">AMS1117 电源</span>
  <span class="chip" data-q="核验一下刚才的板子">核验上一块</span>
</div>

<footer>
  <textarea id="input" placeholder="说出你想做的 PCB… (Enter 发送, Shift+Enter 换行)"></textarea>
  <button id="send">发送</button>
</footer>

<script>
// 同源优先(被桥服务器直接托管时), 退回 localhost:9907(在 EDA 内以 file:// 加载时)
const _qp = new URLSearchParams(location.search);
const BRIDGE_URL = (location.protocol === 'http:' || location.protocol === 'https:')
  ? location.origin : 'http://127.0.0.1:9907';
const $ = (id) => document.getElementById(id);
const hist = $('history');

// 多轮会话态: 可由 URL ?s= 固定会话(便于跨页多轮), 否则随机
const SESSION = _qp.get('s') || ('ext-' + Math.random().toString(36).slice(2, 10));
let lastOutputDir = _qp.get('dir') || null;
let busy = false;

function scrollBottom() { hist.scrollTop = hist.scrollHeight; }

function addMsg(who, cls, text) {
  const m = document.createElement('div');
  m.className = 'msg ' + cls;
  const w = document.createElement('span'); w.className = 'who'; w.textContent = who;
  const b = document.createElement('div'); b.className = 'bubble'; b.textContent = text;
  if (cls !== 'sys') m.appendChild(w);
  m.appendChild(b);
  hist.appendChild(m);
  scrollBottom();
  return { m, b };
}

function setDot(state) {
  const d = $('dot');
  d.className = 'dot' + (state === true ? ' ok' : state === false ? ' bad' : '');
}

function renderVerdict(bubble, data) {
  const v = document.createElement('div');
  v.className = 'verdict';

  if (typeof data.delivered === 'boolean') {
    const l = document.createElement('div'); l.className = 'line';
    l.innerHTML = '<span class="k">交付</span>';
    const badge = document.createElement('span');
    badge.className = 'vbadge ' + (data.delivered ? 'on' : 'off');
    badge.textContent = data.delivered ? '✓ 已交付' : '✗ 未闭合';
    l.appendChild(badge);
    v.appendChild(l);
  }
  if (data.free_energy !== undefined && data.free_energy !== null) {
    const fe = Number(data.free_energy);
    const l = document.createElement('div'); l.className = 'line';
    l.innerHTML = '<span class="k">自由能</span>';
    const s = document.createElement('span');
    s.className = 'fe ' + (fe === 0 ? 'zero' : 'nonzero');
    s.textContent = fe === 0 ? '0  (预测误差归零)' : fe.toFixed(2);
    l.appendChild(s);
    v.appendChild(l);
  }
  if (data.next_action) {
    const l = document.createElement('div'); l.className = 'line';
    l.innerHTML = '<span class="k">下一步</span>';
    const s = document.createElement('span'); s.className = 'next';
    s.textContent = data.next_action;
    l.appendChild(s);
    v.appendChild(l);
  }
  const arts = [];
  if (data.pcb_path) arts.push('PCB');
  if (data.gerber_dir || (data.gerber && data.gerber.count)) arts.push('Gerber');
  if (data.bom && data.bom.items) arts.push('BOM×' + data.bom.items);
  if (data.cpl && data.cpl.items) arts.push('CPL×' + data.cpl.items);
  if (data.ibom) arts.push('iBoM');
  if (arts.length) {
    const wrap = document.createElement('div'); wrap.className = 'arts';
    arts.forEach((a) => { const c = document.createElement('span'); c.className = 'art'; c.textContent = a; wrap.appendChild(c); });
    v.appendChild(wrap);
  }
  if (v.children.length) bubble.appendChild(v);
  scrollBottom();
}

async function ask(message) {
  if (busy || !message.trim()) return;
  busy = true; $('send').disabled = true;
  addMsg('你', 'user', message);

  const { b } = addMsg('PCB Copilot', 'ai', '');
  b.innerHTML = '<span class="typing dots">正在走链路</span>';

  try {
    const r = await fetch(BRIDGE_URL + '/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message, session: SESSION, output_dir: lastOutputDir }),
    });
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const data = await r.json();
    setDot(true);

    b.innerHTML = '';
    const txt = document.createElement('div');
    txt.textContent = data.reply || '(无回复)';
    b.appendChild(txt);
    renderVerdict(b, data);

    if (data.output_dir) lastOutputDir = data.output_dir;
  } catch (e) {
    setDot(false);
    b.innerHTML = '';
    b.textContent =
      '⚠ 无法连接 PCB 大脑 (' + BRIDGE_URL + '/chat)\n' +
      '请确认已在终端运行:  python lceda_bridge/lceda_bridge_server.py\n\n错误: ' + e;
  } finally {
    busy = false; $('send').disabled = false;
    $('input').focus();
  }
}

function submit() {
  const v = $('input').value;
  if (!v.trim()) return;
  $('input').value = '';
  ask(v);
}

$('send').addEventListener('click', submit);
$('input').addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); submit(); }
});
document.querySelectorAll('.chip').forEach((c) => {
  c.addEventListener('click', () => { $('input').value = c.dataset.q; $('input').focus(); });
});

// 初次探活
fetch(BRIDGE_URL + '/ping', { cache: 'no-store' })
  .then((r) => r.json()).then(() => setDot(true))
  .catch(() => setDot(false));

// 若 URL 带 ?q=, 加载即自动发送(便于一键演示一句话→全链路→裁决)
const _autoQ = _qp.get('q');
if (_autoQ) { setTimeout(() => ask(_autoQ), 400); }
</script>
</body>
</html>
